  - aid: cribl:cribl-as-code-api
    name: Cribl As Code API
    description: The Cribl As Code API enables developers to manage Cribl configurations programmatically using infrastructure-as-code
      principles. It supports exporting and importing configurations across deployments, enabling version control, CI/CD integration,
      and reproducible infrastructure management. Developers can use the API alongside SDKs for Python, Go, and TypeScript or
      through Terraform providers.
