  - aid: cribl:cribl-edge-api
    name: Cribl Edge API
    description: The Cribl Edge API provides programmatic access to Cribl Edge, which extends Stream capabilities to the network
      edge by deploying lightweight agents on endpoints. The API allows developers to manage edge fleets, configure data collection
      from endpoints, and control data processing closer to the source.
