aid: cribl
name: Cribl
kind: company
description: Cribl is an observability pipeline company providing a suite of products for collecting, processing, routing,
  searching, and storing telemetry data at scale. Cribl's developer platform offers REST APIs across Stream, Edge, Search,
  Lake, and the As Code product line, exposing programmatic control over data pipelines, edge agents, federated search jobs,
  lake datasets, and infrastructure-as-code configuration management. The Cribl Cloud API acts as a centrally managed control
  plane across all deployments and authenticates with OAuth 2.0 client credentials.
url: https://raw.githubusercontent.com/api-evangelist/cribl/refs/heads/main/apis.yml
