apis:
  - aid: cribl:cribl-cloud-api
    name: Cribl Cloud API
    description: The Cribl Cloud API is a RESTful control plane API for programmatically configuring and managing Cribl resources
      across Stream, Edge, Search, and Lake deployments. It allows developers to retrieve and manage data, automate repetitive
      manual processes, and integrate with third-party applications. The API uses OAuth 2.0 client credentials and follows a
      resource-based structure where each endpoint corresponds to a specific Cribl resource or collection.
    humanURL: https://docs.cribl.io/api-reference/
    baseURL: https://api.cribl.cloud
