  - aid: cribl:cribl-lake-api
    name: Cribl Lake API
    description: The Cribl Lake API provides programmatic access to Cribl Lake, a data lake solution purpose-built for observability
      and security data. The API enables developers to manage data storage, retention policies, and access controls for large
      volumes of telemetry data in open formats.
