naftiko: 1.0.0-alpha2
info:
  label: Cribl Edge API — Edge Fleets
  description: 'Cribl Edge API — Edge Fleets. 6 operations. Lead operation: List all edge fleets. Self-contained Naftiko capability
    covering one Cribl business surface.'
  tags:
  - Cribl
  - Edge Fleets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRIBL_API_KEY: CRIBL_API_KEY
capability:
  consumes:
  - type: http
    namespace: edge-edge-fleets
    baseUri: https://{workspaceName}-{organizationId}.cribl.cloud/api/v1
    description: Cribl Edge API — Edge Fleets business capability. Self-contained, no shared references.
    resources:
    - name: master-groups
      path: /master/groups
      operations:
      - name: listedgefleets
        method: GET
        description: List all edge fleets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: product
          in: query
          type: string
          description: Filter by product type to show only edge fleets
      - name: createedgefleet
        method: POST
        description: Create a new edge fleet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: master-groups-id
      path: /master/groups/{id}
      operations:
      - name: getedgefleet
        method: GET
        description: Get an edge fleet by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateedgefleet
        method: PATCH
        description: Update an edge fleet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteedgefleet
        method: DELETE
        description: Delete an edge fleet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: master-groups-id-deploy
      path: /master/groups/{id}/deploy
      operations:
      - name: deployedgefleet
        method: POST
        description: Deploy configuration to an edge fleet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CRIBL_API_KEY}}'
  exposes:
  - type: rest
    namespace: edge-edge-fleets-rest
    port: 8080
    description: REST adapter for Cribl Edge API — Edge Fleets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/master/groups
      name: master-groups
      description: REST surface for master-groups.
      operations:
      - method: GET
        name: listedgefleets
        description: List all edge fleets
        call: edge-edge-fleets.listedgefleets
        with:
          product: rest.product
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createedgefleet
        description: Create a new edge fleet
        call: edge-edge-fleets.createedgefleet
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/master/groups/{id}
      name: master-groups-id
      description: REST surface for master-groups-id.
      operations:
      - method: GET
        name: getedgefleet
        description: Get an edge fleet by ID
        call: edge-edge-fleets.getedgefleet
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateedgefleet
        description: Update an edge fleet
        call: edge-edge-fleets.updateedgefleet
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteedgefleet
        description: Delete an edge fleet
        call: edge-edge-fleets.deleteedgefleet
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/master/groups/{id}/deploy
      name: master-groups-id-deploy
      description: REST surface for master-groups-id-deploy.
      operations:
      - method: POST
        name: deployedgefleet
        description: Deploy configuration to an edge fleet
        call: edge-edge-fleets.deployedgefleet
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: edge-edge-fleets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cribl Edge API — Edge Fleets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-edge-fleets
      description: List all edge fleets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edge-edge-fleets.listedgefleets
      with:
        product: tools.product
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-edge-fleet
      description: Create a new edge fleet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: edge-edge-fleets.createedgefleet
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-edge-fleet-id
      description: Get an edge fleet by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: edge-edge-fleets.getedgefleet
      outputParameters:
      - type: object
        mapping: $.
    - name: update-edge-fleet
      description: Update an edge fleet
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: edge-edge-fleets.updateedgefleet
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-edge-fleet
      description: Delete an edge fleet
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: edge-edge-fleets.deleteedgefleet
      outputParameters:
      - type: object
        mapping: $.
    - name: deploy-configuration-edge-fleet
      description: Deploy configuration to an edge fleet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: edge-edge-fleets.deployedgefleet
      outputParameters:
      - type: object
        mapping: $.
