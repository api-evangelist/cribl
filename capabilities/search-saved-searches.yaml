      description: REST surface for search-saved-id.
      operations:
      - method: GET
        name: getsavedsearch
        description: Get a saved search by ID
        call: search-saved-searches.getsavedsearch
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesavedsearch
        description: Update a saved search
        call: search-saved-searches.updatesavedsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
