naftiko: 1.0.0-alpha2
info:
  label: Cribl Search API — Saved Searches
  description: 'Cribl Search API — Saved Searches. 5 operations. Lead operation: List all saved searches. Self-contained Naftiko
    capability covering one Cribl business surface.'
  tags:
  - Cribl
  - Saved Searches
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
