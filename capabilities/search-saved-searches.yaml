    resources:
    - name: search-saved
      path: /search/saved
      operations:
      - name: listsavedsearches
        method: GET
        description: List all saved searches
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsavedsearch
        method: POST
        description: Create a saved search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: search-saved-id
      path: /search/saved/{id}
      operations:
      - name: getsavedsearch
        method: GET
        description: Get a saved search by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesavedsearch
        method: PATCH
        description: Update a saved search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesavedsearch
        method: DELETE
        description: Delete a saved search
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CRIBL_API_KEY}}'
  exposes:
