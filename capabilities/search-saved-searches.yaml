    namespace: search-saved-searches-rest
    port: 8080
    description: REST adapter for Cribl Search API — Saved Searches. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/search/saved
      name: search-saved
      description: REST surface for search-saved.
      operations:
      - method: GET
        name: listsavedsearches
        description: List all saved searches
        call: search-saved-searches.listsavedsearches
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsavedsearch
        description: Create a saved search
        call: search-saved-searches.createsavedsearch
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search/saved/{id}
