naftiko: 1.0.0-alpha2
info:
  label: Cribl Cloud API — Jobs
  description: 'Cribl Cloud API — Jobs. 2 operations. Lead operation: List all jobs. Self-contained Naftiko capability covering
    one Cribl business surface.'
  tags:
  - Cribl
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRIBL_API_KEY: CRIBL_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-jobs
    baseUri: https://{workspaceName}-{organizationId}.cribl.cloud/api/v1
    description: Cribl Cloud API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: List all jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobs-id
      path: /jobs/{id}
      operations:
      - name: getjob
        method: GET
        description: Get a job by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CRIBL_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-jobs-rest
    port: 8080
    description: REST adapter for Cribl Cloud API — Jobs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: List all jobs
        call: cloud-jobs.listjobs
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{id}
      name: jobs-id
      description: REST surface for jobs-id.
      operations:
      - method: GET
        name: getjob
        description: Get a job by ID
        call: cloud-jobs.getjob
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cribl Cloud API — Jobs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-jobs
      description: List all jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-jobs.listjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job-id
      description: Get a job by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-jobs.getjob
      outputParameters:
      - type: object
        mapping: $.
