naftiko: 1.0.0-alpha2
info:
  label: Cribl Cloud API — Sources
  description: 'Cribl Cloud API — Sources. 5 operations. Lead operation: List all sources. Self-contained Naftiko capability
    covering one Cribl business surface.'
  tags:
  - Cribl
  - Sources
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRIBL_API_KEY: CRIBL_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-sources
    baseUri: https://{workspaceName}-{organizationId}.cribl.cloud/api/v1
    description: Cribl Cloud API — Sources business capability. Self-contained, no shared references.
    resources:
    - name: system-sources
      path: /system/sources
      operations:
      - name: listsources
        method: GET
        description: List all sources
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsource
        method: POST
        description: Create a new source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: system-sources-id
      path: /system/sources/{id}
      operations:
      - name: getsource
        method: GET
        description: Get a source by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesource
        method: PATCH
        description: Update a source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesource
        method: DELETE
        description: Delete a source
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CRIBL_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-sources-rest
    port: 8080
    description: REST adapter for Cribl Cloud API — Sources. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/system/sources
      name: system-sources
      description: REST surface for system-sources.
      operations:
      - method: GET
        name: listsources
        description: List all sources
        call: cloud-sources.listsources
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsource
        description: Create a new source
        call: cloud-sources.createsource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/system/sources/{id}
      name: system-sources-id
      description: REST surface for system-sources-id.
      operations:
      - method: GET
        name: getsource
        description: Get a source by ID
        call: cloud-sources.getsource
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesource
        description: Update a source
        call: cloud-sources.updatesource
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesource
        description: Delete a source
        call: cloud-sources.deletesource
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-sources-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cribl Cloud API — Sources. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-sources
      description: List all sources
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-sources.listsources
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-source
      description: Create a new source
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-sources.createsource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-source-id
      description: Get a source by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-sources.getsource
      outputParameters:
      - type: object
        mapping: $.
    - name: update-source
      description: Update a source
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloud-sources.updatesource
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-source
      description: Delete a source
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-sources.deletesource
      outputParameters:
      - type: object
        mapping: $.
