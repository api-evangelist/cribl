naftiko: 1.0.0-alpha2
info:
  label: Cribl Stream API — Collectors
  description: 'Cribl Stream API — Collectors. 1 operations. Lead operation: List all Stream collectors. Self-contained Naftiko
    capability covering one Cribl business surface.'
  tags:
  - Cribl
  - Collectors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRIBL_API_KEY: CRIBL_API_KEY
capability:
  consumes:
  - type: http
    namespace: stream-collectors
    baseUri: https://{workspaceName}-{organizationId}.cribl.cloud/api/v1
    description: Cribl Stream API — Collectors business capability. Self-contained, no shared references.
    resources:
    - name: system-collectors
      path: /system/collectors
      operations:
      - name: liststreamcollectors
        method: GET
        description: List all Stream collectors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CRIBL_API_KEY}}'
  exposes:
  - type: rest
    namespace: stream-collectors-rest
    port: 8080
    description: REST adapter for Cribl Stream API — Collectors. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/system/collectors
      name: system-collectors
      description: REST surface for system-collectors.
      operations:
      - method: GET
        name: liststreamcollectors
        description: List all Stream collectors
        call: stream-collectors.liststreamcollectors
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stream-collectors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cribl Stream API — Collectors. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-stream-collectors
      description: List all Stream collectors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stream-collectors.liststreamcollectors
      outputParameters:
      - type: object
        mapping: $.
