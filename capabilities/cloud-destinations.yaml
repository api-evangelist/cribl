        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-destinations.createdestination
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-destination-id
      description: Get a destination by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-destinations.getdestination
      outputParameters:
      - type: object
        mapping: $.
    - name: update-destination
      description: Update a destination
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloud-destinations.updatedestination
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-destination
