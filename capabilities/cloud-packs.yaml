naftiko: 1.0.0-alpha2
info:
  label: Cribl Cloud API — Packs
  description: 'Cribl Cloud API — Packs. 5 operations. Lead operation: List all packs. Self-contained Naftiko capability covering
    one Cribl business surface.'
  tags:
  - Cribl
  - Packs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CRIBL_API_KEY: CRIBL_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-packs
    baseUri: https://{workspaceName}-{organizationId}.cribl.cloud/api/v1
    description: Cribl Cloud API — Packs business capability. Self-contained, no shared references.
    resources:
    - name: packs
      path: /packs
      operations:
      - name: listpacks
        method: GET
        description: List all packs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: installpack
        method: POST
        description: Install a pack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: packs-id
      path: /packs/{id}
      operations:
      - name: getpack
        method: GET
        description: Get a pack by ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatepack
        method: PATCH
        description: Update a pack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletepack
        method: DELETE
        description: Delete a pack
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CRIBL_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-packs-rest
    port: 8080
    description: REST adapter for Cribl Cloud API — Packs. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/packs
      name: packs
      description: REST surface for packs.
      operations:
      - method: GET
        name: listpacks
        description: List all packs
        call: cloud-packs.listpacks
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: installpack
        description: Install a pack
        call: cloud-packs.installpack
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/packs/{id}
      name: packs-id
      description: REST surface for packs-id.
      operations:
      - method: GET
        name: getpack
        description: Get a pack by ID
        call: cloud-packs.getpack
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatepack
        description: Update a pack
        call: cloud-packs.updatepack
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletepack
        description: Delete a pack
        call: cloud-packs.deletepack
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-packs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cribl Cloud API — Packs. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-packs
      description: List all packs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-packs.listpacks
      outputParameters:
      - type: object
        mapping: $.
    - name: install-pack
      description: Install a pack
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-packs.installpack
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-pack-id
      description: Get a pack by ID
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-packs.getpack
      outputParameters:
      - type: object
        mapping: $.
    - name: update-pack
      description: Update a pack
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: cloud-packs.updatepack
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-pack
      description: Delete a pack
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-packs.deletepack
      outputParameters:
      - type: object
        mapping: $.
